<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Mahima</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=Pacifico&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background-color: #fff0f5; overflow-x: hidden; position: relative; }

.heart {
  position: fixed;
  bottom: -20px;
  font-size: 20px;
  animation: floatUp 6s linear infinite;
  opacity: 0.7;
}

@keyframes floatUp {
  0% { transform: translateY(0) scale(1); opacity: 0.7; }
  100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
}
</style>
</head>

<body class="text-center font-body flex flex-col items-center">

<!-- Background Music -->
<audio id="bg-music" autoplay loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_5c1bfb03bb.mp3" type="audio/mpeg">
</audio>

<h1 class="text-4xl font-bold mt-10">Happy Birthday Mahima 🌸</h1>
<p class="mt-2 text-lg">10 April 2026</p>

<!-- Photos -->
<div class="grid grid-cols-2 gap-4 p-6 max-w-md">
    <img src="image1.jpg" class="rounded-xl shadow">
    <img src="image2.jpg" class="rounded-xl shadow">
    <img src="image3.jpg" class="rounded-xl shadow">
    <img src="image4.jpg" class="rounded-xl shadow">
</div>

<!-- Typing Text -->
<p id="typing-text" class="mt-6 text-xl font-semibold"></p>

<script>
// Fix autoplay restriction
window.addEventListener('click', () => {
  document.getElementById('bg-music').play();
});

// Typing effect
const text = "Love you so much infinity times ❤️";
let index = 0;

function typeEffect() {
  if(index < text.length) {
    document.getElementById("typing-text").innerHTML += text.charAt(index);
    index++;
    setTimeout(typeEffect, 60);
  }
}
window.onload = typeEffect;

// Floating hearts
function createHeart() {
  const heart = document.createElement('div');
  heart.classList.add('heart');
  heart.innerHTML = '❤️';
  heart.style.left = Math.random() * 100 + 'vw';
  heart.style.animationDuration = (4 + Math.random() * 3) + 's';
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 7000);
}

setInterval(createHeart, 500);
</script>

</body>
</html>
